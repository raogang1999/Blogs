baseURL = "https://raogang.lumio.top/"

locale = "zh-Hans"
defaultContentLanguage = "zh-hans"  

title = "Gang的博客"
theme = "PaperMod"

## 是否禁止URL Path转小写
disablePathToLower = true

hasCJKLanguage = true
paginate = 10
enableRobotsTXT = true

## Google Analytics 配置
[services]
  [services.googleAnalytics]
    id = "G-N928ZMKE05"

[params]
  env = "production"
  author = "Gang"
  description = "研究方向为联邦学习的隐私保护，技术方向为区块链、同态加密、差分隐私。"
  keywords = ["Go","Python","Pytorch","密码学","深度学习","区块链","联邦学习","隐私保护"]
  defaultTheme = "auto"  # dark, light, auto
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  showtoc = true
  tocopen = false
  comments = true

  [params.homeInfoParams]
    Title = "Gang的博客"
    Content = "研究方向为联邦学习的隐私保护，技术方向为区块链、同态加密、差分隐私。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/raogang1999/"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

## 配置 waline 评论系统
[params.waline]
  enable = true
  placeholder = "说点什么吧..."
  serverURL = "https://comments.raogang.lumio.top/"

## 开启版权声明
[params.cc]
  name = "知识共享署名-非商业性使用-禁止演绎 4.0 国际许可协议"
  link = "https://creativecommons.org/licenses/by-nc-nd/4.0/"

## 配置代码高亮
[markup]
  [markup.highlight]
    codeFences = true
    noClasses = false
    lineNumbersInTable = true
    tabWidth = 4

## 导航菜单
[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/post/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "分类"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 40

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 50

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 60

## PaperMod 搜索功能
[outputs]
  home = ["HTML", "RSS", "JSON"]
    lineNoStart=1
    lineNos = false
    noClasses=true
    style = 'monokai'

